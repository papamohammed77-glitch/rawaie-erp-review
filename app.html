<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الروائع ERP</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="الروائع">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;overflow:hidden;position:fixed;width:100%}
        body{font-family:'Cairo',sans-serif;background:#f1f5f9;-webkit-tap-highlight-color:transparent}
        :root{--sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom)}
        .auth-bg{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 35%,#2563eb 100%)}
    </style>
</head>
<body class="h-full flex flex-col overflow-hidden">

<div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center auth-bg p-4">
    <div class="bg-white rounded-[32px] shadow-2xl p-6 w-[92%] max-w-md">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4">
                <img id="loginLogo" src="" class="w-full h-full object-cover rounded-2xl hidden" onerror="this.style.display='none'">
                <span id="loginLogoFallback" class="text-white text-3xl font-black">ر</span>
            </div>
            <h1 class="font-black text-2xl text-gray-800" id="loginCompanyName">الروائع</h1>
            <p class="text-xs text-gray-400 font-bold mt-1">نظام ERP متكامل</p>
        </div>
        <h2 class="text-lg font-bold text-gray-700 text-center mb-4">تسجيل الدخول</h2>
        <div class="space-y-3">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">البريد الإلكتروني</label>
                <input id="loginEmail" type="email" placeholder="example@domain.com" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-blue-600 focus:bg-white outline-none font-bold text-sm transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">كلمة السر</label>
                <div class="relative">
                    <input id="loginPass" type="password" placeholder="••••••••" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-blue-600 focus:bg-white outline-none font-bold text-sm transition-all pr-12">
                    <button type="button" onclick="App.togglePass()" class="absolute left-2 top-1/2 -translate-y-1/2 p-2 text-gray-400 hover:text-gray-600">
                        <i id="passIcon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="checkbox" id="rememberMe" class="accent-blue-600 w-4 h-4"> 
                    <span class="text-xs text-gray-600 font-bold">تذكرني</span>
                </label>
                <button onclick="App.forgotPassword()" class="text-blue-600 font-bold text-xs hover:underline">نسيت كلمة المرور؟</button>
            </div>
        </div>
        <button onclick="App.doLogin()" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3.5 rounded-xl font-black text-sm shadow-lg shadow-blue-200 hover:shadow-xl transition-all mt-4">
            تسجيل الدخول
        </button>
        <p id="loginMsg" class="text-center text-xs text-red-500 font-bold mt-3 hidden"></p>
        <div class="mt-4 text-center">
            <a href="main.html" class="text-gray-400 text-xs hover:text-blue-600">الدخول إلى النظام الأم</a>
        </div>
    </div>
</div>

<script>
var SUPABASE_URL = 'https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function byId(id) { return document.getElementById(id); }

supabase.from('app_settings').select('company_name, company_logo').limit(1).single().then(function(r) {
    if (r.data) {
        byId('loginCompanyName').innerText = r.data.company_name || 'الروائع';
        if (r.data.company_logo) {
            byId('loginLogo').src = r.data.company_logo;
            byId('loginLogo').classList.remove('hidden');
            byId('loginLogoFallback').classList.add('hidden');
        }
    }
});

var App = {
    togglePass: function() {
        var input = byId('loginPass');
        var icon = byId('passIcon');
        if (input.type === 'password') { input.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
        else { input.type = 'password'; icon.className = 'fa-solid fa-eye'; }
    },

    forgotPassword: function() {
        var email = byId('loginEmail').value.trim();
        if (!email) { Swal.fire({ toast: true, position: 'top', icon: 'warning', title: 'أدخل بريدك أولاً', timer: 2000, showConfirmButton: false }); return; }
        Swal.showLoading();
        supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/companies/company-1/main.html' }).then(function(res) {
            Swal.close();
            if (res.error) Swal.fire({ toast: true, position: 'top', icon: 'error', title: res.error.message, timer: 3000, showConfirmButton: false });
            else Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'تم إرسال رابط إعادة تعيين كلمة المرور', timer: 3000, showConfirmButton: false });
        });
    },

    doLogin: function() {
        var email = byId('loginEmail').value.trim();
        var pass = byId('loginPass').value.trim();
        if (!email || !pass) {
            byId('loginMsg').innerText = 'أدخل البريد الإلكتروني وكلمة المرور';
            byId('loginMsg').classList.remove('hidden');
            return;
        }
        byId('loginMsg').classList.add('hidden');
        Swal.showLoading();
        supabase.auth.signInWithPassword({ email: email, password: pass }).then(function(res) {
            Swal.close();
            if (res.error) {
                byId('loginMsg').innerText = res.error.message;
                byId('loginMsg').classList.remove('hidden');
            } else {
                if (byId('rememberMe').checked) localStorage.setItem('rawaea_remember_email', email);
                else localStorage.removeItem('rawaea_remember_email');
                App.redirectAfterLogin();
            }
        }).catch(function() {
            Swal.close();
            byId('loginMsg').innerText = 'فشل الاتصال بالخادم';
            byId('loginMsg').classList.remove('hidden');
        });
    },

    redirectAfterLogin: function() {
        supabase.auth.getSession().then(function(res) {
            var user = res.data.session ? res.data.session.user : null;
            if (!user) return;
            var meta = user.user_metadata || {};
            var isOwner = (meta.isOwner === true || meta.isOwner === 'true' || meta.role === 'owner' || meta.role === 'مالك');
            var perms = meta.permissions || [];

            supabase.from('users').select('active_warehouse_role').eq('email', user.email).single().then(function(r) {
                var activeWarehouseRole = (r.data && r.data.active_warehouse_role) ? r.data.active_warehouse_role : '';
                App._doRedirect(isOwner, perms, activeWarehouseRole);
            });
        });
    },

    _doRedirect: function(isOwner, perms, activeWarehouseRole) {
        var base = '/companies/company-1';

        // 1. المالك
        if (isOwner) { window.location.replace(base + '/main.html'); return; }

        // 2. عمال المخازن (حسب الدور النشط)
        if (activeWarehouseRole === 'استلام') { window.location.replace(base + '/warehouse/receiver.html'); return; }
        if (activeWarehouseRole === 'تحضير') { window.location.replace(base + '/warehouse/picker.html'); return; }
        if (activeWarehouseRole === 'تحميل') { window.location.replace(base + '/warehouse/loader.html'); return; }
        if (activeWarehouseRole === 'مرتجعات') { window.location.replace(base + '/warehouse/returns.html'); return; }
        if (activeWarehouseRole === 'تفريغ') { window.location.replace(base + '/warehouse/unloader.html'); return; }
        if (activeWarehouseRole === 'جرد') { window.location.replace(base + '/warehouse/counter.html'); return; }
        if (activeWarehouseRole === 'أذونات') { window.location.replace(base + '/warehouse/vouchers.html'); return; }

        // 3. مشرفو ومديرو المخازن
        if (perms.indexOf('warehouse_supervisor') !== -1) { window.location.replace(base + '/warehouse/supervisor.html'); return; }
        if (perms.indexOf('warehouse_manager') !== -1) { window.location.replace(base + '/warehouse/manager.html'); return; }

        // 4. المبيعات
        if (perms.indexOf('pos') !== -1) { window.location.replace(base + '/sales/pos.html'); return; }
        if (perms.indexOf('telesales') !== -1) { window.location.replace(base + '/sales/telesales.html'); return; }
        if (perms.indexOf('orders') !== -1) { window.location.replace(base + '/sales/order-taker.html'); return; }
        if (perms.indexOf('van-sales') !== -1) { window.location.replace(base + '/sales/van-sales.html'); return; }
        if (perms.indexOf('sales_supervisor') !== -1) { window.location.replace(base + '/sales/supervisor.html'); return; }
        if (perms.indexOf('sales_manager') !== -1) { window.location.replace(base + '/sales/manager.html'); return; }

        // 5. التوصيل
        if (perms.indexOf('delivery') !== -1) { window.location.replace(base + '/delivery/driver.html'); return; }
        if (perms.indexOf('delivery_supervisor') !== -1) { window.location.replace(base + '/delivery/supervisor.html'); return; }

        // 6. المشتريات
        if (perms.indexOf('purchases') !== -1) { window.location.replace(base + '/purchasing/buyer.html'); return; }
        if (perms.indexOf('purchases_supervisor') !== -1) { window.location.replace(base + '/purchasing/supervisor.html'); return; }

        // 7. المكتب
        if (perms.indexOf('finance') !== -1) { window.location.replace(base + '/office/accountant.html'); return; }
        if (perms.indexOf('finance_manager') !== -1) { window.location.replace(base + '/office/finance-manager.html'); return; }
        if (perms.indexOf('general_manager') !== -1) { window.location.replace(base + '/office/general-manager.html'); return; }
        if (perms.indexOf('hr') !== -1) { window.location.replace(base + '/office/hr.html'); return; }

        // 8. المتجر
        if (perms.indexOf('online-store') !== -1) { window.location.replace(base + '/store/index.html'); return; }

        // 9. إذا كان لديه صلاحية warehouse لكن active_warehouse_role فارغ
        if (perms.indexOf('warehouse') !== -1) {
            Swal.fire({
                title: 'تنبيه',
                text: 'لم يتم تعيين دور نشط لك. الرجاء التواصل مع مشرف المخازن.',
                icon: 'warning'
            }).then(function() {
                supabase.auth.signOut();
            });
            return;
        }

        // 10. افتراضي – النظام الأم
        window.location.replace(base + '/main.html');
    }
};

var remembered = localStorage.getItem('rawaea_remember_email');
if (remembered) { byId('loginEmail').value = remembered; byId('rememberMe').checked = true; }

supabase.auth.getSession().then(function(res) {
    if (res.data && res.data.session) { App.redirectAfterLogin(); }
});

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function() {}); }
</script>
</body>
</html>
